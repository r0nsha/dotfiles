# nor.nvim dark for yazi
# auto generated with https://tangled.org/ronshavit.com/nor.nvim/blob/master/lua/nor/extras/yazi.lua

[mgr]
# NOTE: can combined with tmTheme (sublime colorshceme file) for preview code highlight
# syntect_theme = "path/to/tmTheme"

cwd = { fg = "#61bba8", italic = true }

# Hovered
hovered = { bg = "#262626" }
preview_hovered = { bg = "#262626" }

# Find
find_keyword = { fg = "#ffffff", bg = "#492341", bold = true }
find_position = { fg = "#5baba9", bg = "#262626", bold = true }

# Marker
marker_copied = { fg = "#66bd86", bg = "#66bd86" }
marker_cut = { fg = "#e26d6d", bg = "#e26d6d" }
marker_marked = { fg = "#e57ab8", bg = "#e57ab8" }
marker_selected = { fg = "#5baba9", bg = "#5baba9" }

# Tab
tab_active = { fg = "#000000", bg = "#5baba9" }
tab_inactive = { fg = "#9e9e9e", bg = "#000000" }

# Count
count_copied = { fg = "#000000", bg = "#66bd86" }
count_cut = { fg = "#000000", bg = "#f29090" }
count_selected = { fg = "#000000", bg = "#5baba9" }

# Border
border_symbol = " "
border_style = { fg = "#6a6a6a" }

[tabs]
sep_inner = { open = "█", close = "█" }
sep_outer = { open = "█", close = "█" }

[indicator]
parent = { fg = "#ffffff", bg = "#474747" }
current = { fg = "#000000", bg = "#ffffff" }
preview = { fg = "#ffffff", bg = "#474747" }
padding = { open = "█", close = "█" }

[status]
sep_left = { open = "█", close = "█" }
sep_right = { open = "█", close = "█" }
separator_style = { fg = "#262626", bg = "#262626" }

# Mode
mode_normal = { fg = "#000000", bg = "#5baba9", bold = true }
mode_select = { fg = "#000000", bg = "#e57ab8", bold = true }
mode_unset = { fg = "#000000", bg = "#de7247", bold = true }

# Progress
progress_label = { fg = "#9e9e9e", bold = true }
progress_normal = { fg = "#ffffff" }
progress_error = { fg = "#e26d6d" }

# Permissions
permissions_t = { fg = "#5baba9" }
permissions_r = { fg = "#dba124" }
permissions_w = { fg = "#e26d6d" }
permissions_x = { fg = "#66bd86" }
permissions_s = { fg = "#9e9e9e" }

[select]
border = { fg = "#6a6a6a" }
active = { fg = "#ffffff",  bg = "#262626" }
inactive = { fg = "#ffffff" }

# Input
[input]
border = { fg = "#61bba8" }
title = {}
value = { fg = "#e57ab8" }
selected = { bg = "#262626" }

# Completion
[completion]
border = { fg = "#61bba8" }
active = { fg = "#ffffff", bg = "#262626" }
inactive = { fg = "#ffffff" }

# Tasks
[tasks]
border = { fg = "#6a6a6a" }
title = {}
hovered = { fg = "#ffffff", bg="#262626" }

# Which
[which]
cols = 3
mask = { bg = "#262626" }
cand = { fg = "#61bba8" }
rest = { fg = "#5baba9" }
desc = { fg = "#e57ab8" }
separator = "  "
separator_style = { fg = "#9e9e9e" }

# Notify
[notify]
title_info = { fg = "#3b9ea9" }
title_warn = { fg = "#dba124" }
title_error = { fg = "#e26d6d" }

# Help
[help]
on = { fg = "#66bd86" }
run = { fg = "#e57ab8" }
hovered = { bg = "#262626" }
footer = { fg = "#ffffff", bg = "#262626" }

[filetype]

rules = [
	# Images
	{ mime = "image/*", fg = "#61bba8" },

	# Media
	{ mime = "{audio,video}/*", fg = "#de7247" },

	# Archives
	{ mime = "application/*zip", fg = "#e57ab8" },
	{ mime = "application/x-{tar,bzip*,7z-compressed,xz,rar}", fg = "#e57ab8" },

	# Documents
	{ mime = "application/{pdf,doc,rtf,vnd.*}", fg = "#61bba8" },
]
