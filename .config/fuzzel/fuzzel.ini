[colors]
background=111111ff
text=e0e0e0ff
message=e0e0e0ff
prompt=ffffffff
placeholder=777777ff
input=e0e0e0ff
match=ff8800ff
selection=2a2a2aff
selection-text=ffffffcc
selection-match=ffaa33ff
counter=777777ff
border=555555ff

[border]
width=3
radius=0
selection-radius=0

[main]
font=BerkeleyMono Nerd Font:size=14
dpi-aware=no
use-bold=yes
horizontal-pad=8
vertical-pad=8
inner-pad=4
tabs=4
message-mode=wrap
exit-on-keyboard-focus-loss=yes
match-counter=yes
show-actions=no

include=~/.cache/hellwal/fuzzel.ini

[key-bindings]
prev=Shift+Tab
prev-with-wrap=Up Control+p
next=none
next-with-wrap=Down Control+n
