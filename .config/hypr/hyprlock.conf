source = ~/.cache/hellwal/hyprland.conf

$font = BerkeleyMono Nerd Font Propo
$font_bold = BerkeleyMono Nerd Font Propo Bold

general {
    hide_cursor = false
    ignore_empty_input = true
}

# uncomment to enable fingerprint authentication
# auth {
#     fingerprint {
#         enabled = true
#         ready_message = Scan fingerprint to unlock
#         present_message = Scanning...
#         retry_delay = 250 # in milliseconds
#     }
# }

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 2, linear
    animation = fadeOut, 1, 2, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    path = ~/.cache/current_background

    blur_size = 2
    blur_passes = 3
    brightness = 0.35
    reload_time = 1800 # Should be synced with the `ron-background-random` script's `default_interval`
    crossfade_time = 2
}

# Hour
label {
    text = cmd[update:60000] date +"%H"
    font_size = 200
    font_family = $font_bold
    color = $color15
    shadow_passes = 3
    shadow_size = 3
    shadow_boost = 0.25

    position = 0, 350
    halign = center
    valign = center
}

# Minute
label {
    text = cmd[update:60000] date +"%M"
    font_size = 200
    font_family = $font_bold
    color = $color15

    shadow_passes = 3
    shadow_size = 3
    shadow_boost = 0.25

    position = 0, 140
    halign = center
    valign = center
}

# Date
label {
    text = cmd[update:60000] date +"%A, %d %B"
    font_size = 20
    font_family = $font
    color = $color14

    shadow_passes = 3
    shadow_size = 1
    shadow_boost = 0.25

    position = 0, 5
    halign = center
    valign = center
}

input-field {
    size = 4.5%, 2.5%
    inner_color = $color15alpha
    outer_color = rgba(0, 0, 0, 0)

    fade_on_empty = false
    rounding = 8

    font_family = $font
    font_color = $color15
    placeholder_text =
    fail_text = $PAMFAIL

    position = 0, -80
    halign = center
    valign = center
}

# Layout
label {
    text = $LAYOUT[en,il]
    font_family = $font
    font_size = 12
    color = $color7
    onclick = niri msg action switch-layout next

    position = 1.9%, -80
    halign = center
    valign = center
}
