# ---------------------------- Options ----------------------------

# Default shell to fish
set -g default-command $SHELL
set -g default-shell $SHELL

# Mouse support
set -g mouse on

# Larger history limit
set -g history-limit 100000

# Faster command sequence
set -g escape-time 0

# Faster status refresh interval
set -g status-interval 5

# Enable focus events
set-option -g focus-events on

# Start windows and panes at 1
set -g base-index 1
set -g pane-base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on

# Vi copy mode
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-selection
bind-key -T copy-mode-vi C-q send-keys -X rectangle-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi C-n send-keys -X next-prompt
bind-key -T copy-mode-vi C-p send-keys -X previous-prompt

# Paste buffer
bind-key v paste-buffer
bind-key C-v paste-buffer

# Disable visual notification of activity in other windows
setw -g monitor-activity off
set -g visual-activity off
set -g visual-bell off
set -g visual-silence on

# Don't exit from tmux when closing a session
set -g detach-on-destroy off

# Clock mode
set -g clock-mode-style 24

# Extended keys
set -g extended-keys on
set -g extended-keys-format csi-u
set -g allow-passthrough on

# ---------------------------- Key bindings ----------------------------

# Prefix
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Put new window next to current by default
bind -T prefix c new-window -a
bind -T prefix C-c new-window -a

# Swap windows
bind -T prefix P swap-window -t -1 \; select-window -t -1
bind -T prefix N swap-window -t +1 \; select-window -t +1

# Change layout
bind -T prefix . next-layout
bind -T prefix C-. next-layout

# Switch last window
bind a last-window
bind C-a last-window

# Switch last session
bind L switch-client -l
bind C-L switch-client -l

# Switch sessions
bind -T prefix h switch-client -p \; refresh-client -S
bind -T prefix C-h switch-client -p \; refresh-client -S
bind -T prefix '(' switch-client -p\; refresh-client -S

bind -T prefix l switch-client -n \; refresh-client -S
bind -T prefix C-l switch-client -n \; refresh-client -S
bind -T prefix ')' switch-client -n\; refresh-client -S

# Open panes in cwd & more comfy binds
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

bind m resize-pane -Z

# Disable confirm before killing pane
bind-key x kill-pane

# Kill current session with confirmation
bind -T prefix X confirm-before -p "kill-session #S? (y/n)" kill-session

bind s display-popup -w 36 -h 18 -T "Select directory" -E "ron-tmux-sessionizer"
bind C-s display-popup -w 36 -h 18 -T "Select directory" -E "ron-tmux-sessionizer"
bind S "choose-tree"

# Toggle opencode window
bind o run-shell "ron-tmux-opencode-toggle"
bind c-o run-shell "ron-tmux-opencode-toggle"

# ---------------------------- UI ----------------------------

# Theme (nor.nvim) — ron-theme-apply reloads tmux.conf on switch
if-shell 'fish -c "test (ron-theme-get) = light"' \
    "source-file ~/.config/tmux/themes/nor-light.tmuxtheme" \
    "source-file ~/.config/tmux/themes/nor-dark.tmuxtheme"

set -g status-left-length 100
set -g status-right-length 100

# ---------------------------- Plugins ----------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'mrjones2014/smart-splits.nvim'
set -g @plugin 'wfxr/tmux-fzf-url'

set -g @smart-splits_move_left_key 'C-h'
set -g @smart-splits_move_down_key 'C-j'
set -g @smart-splits_move_up_key 'C-k'
set -g @smart-splits_move_right_key 'C-l'

set -g @smart-splits_resize_left_key 'C-S-h'
set -g @smart-splits_resize_down_key 'C-S-j'
set -g @smart-splits_resize_up_key 'C-S-k'
set -g @smart-splits_resize_right_key 'C-S-l'
set -g @smart-splits_resize_step_size '3'

set -g @fzf-url-bind 'u'

if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'
